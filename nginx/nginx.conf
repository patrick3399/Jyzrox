events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 100m;

    # Rate limits
    limit_req_zone $binary_remote_addr zone=eh_proxy:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=download_zone:10m rate=2r/s;

    # Nginx proxy cache for EH thumbnail CDN images
    proxy_cache_path /tmp/nginx_thumb_cache levels=1:2 keys_zone=thumb_cache:10m
                     max_size=512m inactive=7d use_temp_path=off;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Internal auth endpoint (used by auth_request) ─────────
        location = /_auth {
            internal;
            proxy_pass http://api/api/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;

            # Forward only the cookie for validation
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── Media: require auth via subrequest ────────────────────
        location /media/thumbs/ {
            auth_request /_auth;
            alias /data/thumbs/;
            expires 7d;
            add_header Cache-Control "private, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /media/gallery/ {
            auth_request /_auth;
            alias /data/gallery/;
            expires 1d;
            add_header Cache-Control "private";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /media/avatars/ {
            auth_request /_auth;
            alias /data/avatars/;
            expires 1d;
            add_header Cache-Control "private";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Auth endpoints: rate limited ──────────────────────────
        location /api/auth/login {
            limit_req zone=auth_zone burst=3 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/setup {
            limit_req zone=auth_zone burst=2 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── E-H thumbnail proxy: Nginx-cached ────────────────────
        location /api/eh/thumb-proxy {
            proxy_cache thumb_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_key $request_uri;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── E-H image proxy: rate limited ─────────────────────────
        location /api/eh/image-proxy/ {
            limit_req zone=eh_proxy burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Download endpoint: rate limited ─────────────────────
        location /api/download/ {
            limit_req zone=download_zone burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API + WebSocket ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=60 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        # ── Health check (no auth, no rate limit) ─────────────────
        location = /health {
            proxy_pass http://api/api/health;
            proxy_set_header Host $host;
        }

        # ── Frontend PWA ──────────────────────────────────────────
        location / {
            proxy_pass http://pwa:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
