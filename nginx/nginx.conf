events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limit: last line of defense against client bugs hitting E-H proxy
    limit_req_zone $binary_remote_addr zone=eh_proxy:10m rate=5r/s;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Thumbnails — served directly from ZFS volume (no FastAPI overhead)
        location /media/thumbs/ {
            alias /data/thumbs/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Gallery images — served directly for local/complete galleries
        location /media/gallery/ {
            alias /data/gallery/;
            expires 1d;
            add_header Cache-Control "private";
        }

        # E-H image proxy — rate limited at Nginx level
        location /api/eh/image-proxy/ {
            limit_req zone=eh_proxy burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # API + WebSocket
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        # Health check (bypasses auth)
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://pwa:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
