<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目前離線 — Jyzrox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }
    .card {
      max-width: 360px;
      width: 100%;
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f52d3; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F4F5;</div>
    <h1>目前離線</h1>
    <p>請檢查網路連線後再試。若已恢復連線，點擊下方按鈕重新載入頁面。</p>
    <button onclick="location.reload()">重新載入</button>
  </div>
</body>
</html>
