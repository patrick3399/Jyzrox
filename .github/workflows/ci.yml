name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff==0.11.12
      - run: ruff check .
      - run: ruff format --check .

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements-dev.txt -r requirements-test.txt
      - run: python -m pytest --tb=short

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npx next lint
      - run: npx prettier --check "src/**/*.{ts,tsx,js,json,css}"

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npx vitest run

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      # api/worker use env_file: .env only at runtime, not build time.
      # pwa has no build-time env requirements.
      # A minimal .env is created here only to satisfy docker compose
      # config parsing; no secrets are needed for image builds.
      - name: Create minimal .env for build
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=vault
          POSTGRES_PASSWORD=placeholder
          POSTGRES_DB=vault
          DATABASE_URL=postgresql+asyncpg://vault:placeholder@postgres:5432/vault
          REDIS_URL=redis://redis:6379
          CREDENTIAL_ENCRYPT_KEY=placeholder_32_bytes_for_ci_only_
          SECRET_KEY=placeholder
          EOF
      - run: docker compose build api worker pwa
