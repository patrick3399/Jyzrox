services:
  nginx:
    build: ./nginx
    ports:
      - "${HTTP_PORT:-35689}:80"
    volumes:
      - app_data:/data:ro
      # NAS/SMB mount guide: docs/smb-storage.md
      - ./mnt:/mnt:ro
    depends_on:
      api:
        condition: service_healthy
      pwa:
        condition: service_healthy
    networks:
      - frontend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    # user: managed by entrypoint.sh via gosu (PUID/PGID, default 1042:1042)
    stop_grace_period: 30s
    environment:
      - TZ=Asia/Taipei
      - PUID=1042
      - PGID=1042
    env_file: .env
    volumes:
      - app_data:/data
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
      - ./mnt:/mnt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build: ./backend
    command: arq worker.WorkerSettings
    # user: managed by entrypoint.sh via gosu (PUID/PGID, default 1042:1042)
    stop_grace_period: 120s
    environment:
      - TZ=Asia/Taipei
      - PUID=1042
      - PGID=1042
    env_file: .env
    volumes:
      - app_data:/data
      # host: chown 1042:1042 ./config/gallery-dl && chmod 750 ./config/gallery-dl
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
      - ./mnt:/mnt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis,os; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  pwa:
    build: ./pwa
    environment:
      - TZ=Asia/Taipei
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    networks:
      - frontend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  tagger:
    build: ./tagger
    environment:
      - TAG_MODEL_NAME=SmilingWolf/wd-swinv2-tagger-v3
      - ONNX_PROVIDERS=CPUExecutionProvider
    volumes:
      - app_data:/data:ro
      - ./mnt:/mnt:ro
      - tagger_models:/app/models
    networks:
      - backend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          memory: 1G
    profiles:
      - tagging
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: postgres:18-alpine
    command: >
      postgres
      -c password_encryption=scram-sha-256
      -c log_connections=on
      -c log_disconnections=on
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vault} -d $${POSTGRES_DB:-vault} && psql -U $${POSTGRES_USER:-vault} -d $${POSTGRES_DB:-vault} -c 'SELECT 1' -q -t"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --maxmemory 768mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  app_data:
  postgres_data:
  redis_data:
  tagger_models:

networks:
  frontend:
    name: vault_frontend
  backend:
    name: vault_backend
    internal: true
