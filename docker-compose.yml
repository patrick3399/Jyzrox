services:
  nginx:
    build: ./nginx
    ports:
      - "${HTTP_PORT:-35689}:80"
    volumes:
      - ./data/thumbs:/data/thumbs:ro
      - ./data/gallery:/data/gallery:ro
      - ./data/avatars:/data/avatars:ro
    depends_on:
      - api
    networks:
      - vault
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    user: "1042:1042"
    stop_grace_period: 30s
    env_file: .env
    volumes:
      - ./data/gallery:/data/gallery
      - ./data/thumbs:/data/thumbs
      - ./data/training:/data/training
      - ./data/avatars:/data/avatars
      # host: chown 1042:1042 ./config/gallery-dl && chmod 750 ./config/gallery-dl
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build: ./backend
    command: arq worker.WorkerSettings
    user: "1042:1042"
    stop_grace_period: 120s
    env_file: .env
    volumes:
      - ./data/gallery:/data/gallery
      - ./data/thumbs:/data/thumbs
      - ./data/training:/data/training
      # host: chown 1042:1042 ./config/gallery-dl && chmod 750 ./config/gallery-dl
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import redis,os; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  pwa:
    build: ./pwa
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    networks:
      - vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vault} -d ${POSTGRES_DB:-vault}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vault
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vault
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:

networks:
  vault:
    name: vault_network
