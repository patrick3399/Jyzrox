services:
  nginx:
    build: ./nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./data/thumbs:/data/thumbs:ro
      - ./data/gallery:/data/gallery:ro
      - ./data/avatars:/data/avatars:ro
    depends_on:
      - api
    networks:
      - vault
    restart: unless-stopped

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    user: "1042:1042"
    env_file: .env
    volumes:
      - ./data/gallery:/data/gallery
      - ./data/thumbs:/data/thumbs
      - ./data/training:/data/training
      - ./data/avatars:/data/avatars
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vault
    restart: unless-stopped

  worker:
    build: ./backend
    command: arq worker.WorkerSettings
    user: "1042:1042"
    env_file: .env
    volumes:
      - ./data/gallery:/data/gallery
      - ./data/thumbs:/data/thumbs
      - ./data/training:/data/training
      - ./config/gallery-dl:/home/appuser/.config/gallery-dl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vault
    restart: unless-stopped

  pwa:
    build: ./pwa
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    networks:
      - vault
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vault} -d ${POSTGRES_DB:-vault}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vault
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vault
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  vault:
    name: vault_network
