# Dev override: run api/worker as current host user (UID 1000) to avoid permission issues.
# entrypoint.sh reads PUID/PGID and calls gosu to drop to the correct user.
services:
  api:
    environment:
      - PUID=1000
      - PGID=1000
  worker:
    environment:
      - PUID=1000
      - PGID=1000
